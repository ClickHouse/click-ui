<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Import Variables</title>
    <style>
      :root {
        --spacing: 0.8rem;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background-color: var(--figma-color-bg);
        color: var(--figma-color-text);
        margin: 0;
        padding: var(--spacing);
      }
      html,
      body {
        height: 100%;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: var(--spacing);
        height: 100%;
      }
      button {
        appearance: none;
        border-radius: 4px;
        padding: var(--spacing);
      }
      input,
      select {
        font-family:
          Andale Mono,
          monospace;
        font-size: 0.9rem;
        padding: var(--spacing);
      }
      form > * {
        display: block;
        width: 100%;
      }
      button {
        background-color: var(--figma-color-bg-selected);
        border: none;
        color: var(--figma-color-text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        font-weight: bold;
        transition: all 0.2s ease;
        cursor: pointer;
      }
      button:disabled {
        color: var(--figma-color-text-secondary);
        cursor: not-allowed;
        opacity: 0.4;
      }
      button:hover {
        background-color: var(--figma-color-bg-selected-hover);
      }
      input,
      select {
        background-color: var(--figma-color-bg-secondary);
        color: var(--figma-color-text-secondary);
        border: 2px solid var(--figma-color-border);
      }
      input:focus,
      select:focus {
        border-color: var(--figma-color-border-selected);
        outline: none;
      }
      .collection-container {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      .collection-label {
        font-size: 0.85rem;
        color: var(--figma-color-text-secondary);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }
      .collection-status {
        font-size: 0.75rem;
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-weight: 600;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        display: inline-flex;
        align-items: center;
        width: fit-content;
      }
      .collection-status.new {
        background-color: transparent;
        color: var(--figma-color-text);
      }
      .collection-status.update {
        background-color: transparent;
        color: var(--figma-color-text);
        font-weight: 600;
      }
      .file-container {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        flex: 1;
      }
      .file-label {
        font-size: 0.85rem;
        color: var(--figma-color-text-secondary);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }
      .file-input-wrapper {
        position: relative;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .file-drop-zone {
        flex: 1;
        border: 2px dashed var(--figma-color-border);
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: var(--spacing);
        background-color: var(--figma-color-bg-secondary);
        transition: border-color 0.2s;
      }
      .file-drop-zone:hover,
      .file-drop-zone.drag-over {
        border-color: var(--figma-color-border-selected);
      }
      .file-drop-zone.has-file {
        border-style: solid;
        border-color: var(--figma-color-bg-brand);
        background-color: var(--figma-color-bg-brand-tertiary);
      }
      .file-icon {
        font-size: 2rem;
        color: var(--figma-color-text-secondary);
      }
      .file-text {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        font-size: 0.9rem;
        color: var(--figma-color-text-secondary);
        text-align: center;
      }
      .file-name {
        font-family:
          Andale Mono,
          monospace;
        font-size: 0.85rem;
        color: var(--figma-color-text);
        font-weight: 600;
        word-break: break-all;
      }
      datalist {
        display: none;
      }
      .success-banner {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        background-color: var(--figma-color-bg-success);
        color: var(--figma-color-text-success);
        padding: 12px 20px;
        border-radius: 6px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
          sans-serif;
        font-size: 0.9rem;
        font-weight: 500;
        display: none;
        align-items: center;
        gap: 8px;
        z-index: 1000;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        white-space: nowrap;
      }
      .success-banner.show {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="successBanner" class="success-banner">
      <span id="successText"></span>
    </div>
    <form>
      <div class="collection-container">
        <label class="collection-label">Collection Name</label>
        <input
          id="collectionInput"
          list="collectionsList"
          placeholder="Select existing or type new name..."
          required
          type="text"
          autocomplete="off"
        />
        <datalist id="collectionsList"> </datalist>
        <span
          id="collectionStatus"
          class="collection-status"
          style="display: none"
        ></span>
      </div>
      <div class="file-container">
        <label class="file-label">Token File</label>
        <div class="file-input-wrapper">
          <div class="file-drop-zone" id="fileDropZone">
            <span class="file-icon">📄</span>
            <span class="file-text">Click to upload or drag and drop</span>
            <span class="file-name" id="fileName" style="display: none"></span>
          </div>
          <input
            type="file"
            id="fileInput"
            accept=".json,.dtcg.json,application/json"
            required
          />
        </div>
      </div>
      <button type="submit" id="submitBtn" disabled>
        Create Collection
      </button>
    </form>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
