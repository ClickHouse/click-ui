name: 📚 Storybook to Vercel

on:
  push:
  workflow_dispatch:

env:
  HUSKY: 0
  STORYBOOK_BUILD_DIR: .storybook/out
  # TODO: Request admin to setup the following vercel env vars
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '23.x'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Build Storybook
        run: yarn storybook:build

      - name: Pull Vercel Environment Information
        run: |
          vercel pull \
            --yes \
            --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Create Vercel Build Output
        run: |
          mkdir -p .vercel/output/static
          cp -r ${{ env.STORYBOOK_BUILD_DIR }}/* .vercel/output/static/
          cat > .vercel/output/config.json << EOF
          {
            "version": 3
          }
          EOF

      - name: Deploy to Vercel (Preview)
        if: github.ref != 'refs/heads/main'
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy \
            --prebuilt \
            --yes \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Preview deployed to: $DEPLOYMENT_URL"

      - name: Find Comment
        if: github.ref != 'refs/heads/main'
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Storybook Preview Deployed'

      - name: Create or update comment
        if: github.ref != 'refs/heads/main'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 📚 Storybook Preview Deployed

            ✅ Preview URL: ${{ steps.deploy.outputs.url }}

            Built from commit: `${{ github.sha }}`
          edit-mode: replace

      # TODO: Production builds should be gated
      # behind a successful package release.
      # Each build must be versioned and accessible
      # by its package version,
      # to support concurrent versions running simultaneously.
      # For now, content-hashed URLs are acceptable,
      # as seen in "Deploy to Vercel (Preview)
      # https://linear.app/clickhouse/issue/CUI-95/storybook-production-builds-should-be-gated-behind-package-release

      # - name: Deploy to Vercel (Production)
      #   if: github.ref == 'refs/heads/main'
      #   run: vercel deploy --prebuilt --prod
      #   working-directory: ${{ env.STORYBOOK_BUILD_DIR }}
