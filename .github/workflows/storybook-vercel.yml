name: 📚 Storybook to Vercel

on:
  push:

env:
  HUSKY: 0
  STORYBOOK_BUILD_DIR: .storybook/out
  # TODO: Request admin to setup the following vercel env vars
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '23.x'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Build Storybook
        run: yarn storybook:build

      - name: Deploy to Vercel (Preview)
        if: github.ref != 'refs/heads/main'
        run: vercel deploy --prebuilt
        working-directory: ${{ env.STORYBOOK_BUILD_DIR }}

      # TODO: Production builds should be gated
      # behind a successful package release.
      # Each build must be versioned and accessible
      # by its package version,
      # to support concurrent versions running simultaneously.
      # For now, content-hashed URLs are acceptable,
      # as seen in "Deploy to Vercel (Preview)
      # https://linear.app/clickhouse/issue/CUI-95/storybook-production-builds-should-be-gated-behind-package-release

      # - name: Deploy to Vercel (Production)
      #   if: github.ref == 'refs/heads/main'
      #   run: vercel deploy --prebuilt --prod
      #   working-directory: ${{ env.STORYBOOK_BUILD_DIR }}
