name: 🥷 Code Review (LLM)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-review:
    name: Claude Code Review
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: lts/jod

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          allowed_bots: claude,claude[bot]
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR TITLE: ${{ github.event.pull_request.title }}
            PR AUTHOR: ${{ github.event.pull_request.user.login }}

            You're reviewing a pull request for a **component library**.
            Please use the project's `.llm/CONVENTIONS.md`, `.llm/SECURITY.md`, CHANGELOG.md as your guide and focus on
            what actually matters for a shared UI library used by many teams.

            IMPORTANT: Only flag what affects the PR's goal. Skip nitpicks, obvious issues, and unnecessary explanations.

            ---

            ## 🔍 What to look for

            Think like a maintainer of radix ui, base ui, shadcn/ui, Mantine, or MUI. Review with care for:

            ### 🚨 Must-fix (block merge)
            - Bugs or regressions in component behavior
            - Breaking changes to public component APIs (props, slots, variants) without a migration note
            - Missing or incorrect TypeScript types on exported APIs
            - Security issues (XSS via dangerouslySetInnerHTML, unescaped user content, etc.)
            - Hardcoded values that should be theme tokens or CSS variables

            ### ♿ Accessibility (a11y) — especially important for a component library!
            - Missing ARIA roles, labels, or descriptions on interactive elements
            - Keyboard navigation gaps (focus management, tab order, Escape key handling)
            - Color contrast or visual-only state indicators (missing `aria-disabled`, etc.)
            - Reduced-motion support missing for animated components

            ### 🎨 Component library conventions
            - Does the component accept and forward a `className` prop? (composability)
            - Are `data-*` attributes used for styling hooks instead of generated class names?
            - Is the component using design tokens / CSS variables from the theme instead of hardcoded colors or sizes?
            - Are variants/sizes defined as props rather than bespoke logic?
            - Does the component forward `ref` correctly with `React.forwardRef`?
            - Are polymorphic components (`as` prop or `asChild`) handled safely?

            ### 🧪 Testing
            - Are new component behaviors covered by unit or integration tests?
            - Do tests check both visual and accessible states?

            ### 📦 Bundle & performance
            - Are new dependencies justified? Could a native API or existing util work instead?
            - Are large third-party imports tree-shakeable or lazy?

            ---

            ## 📝 How to format your review

            Use a short, friendly summary at the top. Then group findings by severity:

            **🚨 Must Fix**
            - `ComponentName`: clear issue → what to do

            **♿ Accessibility**
            - `ComponentName`: issue → fix

            **💡 Suggestions** _(optional, non-blocking)_
            - `ComponentName`: small idea that could make it even better

            Keep each item to one or two lines. No lengthy explanations unless truly needed.
            Be warm and constructive — contributors have put real effort into this! 🙌

            If everything looks good, just say:

            > ✅ Looks great! No issues found — nice work!

            ---

            Return your review as your final response.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*)"
